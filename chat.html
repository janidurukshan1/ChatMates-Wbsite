<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMates</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="sidebar">

    <div class="profile-box">
      <img id="profilePic" src="https://via.placeholder.com/50">
      <input type="file" id="uploadPic">
    </div>

    <h3>Chats</h3>
    <ul id="userList"></ul>

  </div>

  <div class="chat-area">

    <div class="chat-header">
      <span id="chatName">Select Chat</span>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="messages" class="messages"></div>
    <div id="typing" class="typing"></div>

    <div class="input-area">
      <input id="msg" placeholder="Type..." 
      onkeypress="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">➤</button>
    </div>

    <div class="bottom-bar">
      <button onclick="openGroup()">👥</button>
      <button onclick="setStatus()">📢</button>
    </div>

  </div>

</div>

<!-- GROUP MODAL -->
<div id="groupModal" class="modal">
  <div class="modal-content">
    <h3>Create Group</h3>
    <input id="groupName" placeholder="Group name">
    <div id="memberList"></div>
    <button onclick="createGroup()">Create</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script src="ui.js"></script>

</body>
</html>
