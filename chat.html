<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMates</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h3>Chats</h3>
    <ul id="userList"></ul>
  </div>

  <!-- Chat -->
  <div class="chat-area">

    <div class="chat-header">
      <button onclick="toggleSidebar()">☰</button>
      <span id="chatName">Select Chat</span>
      <span id="statusText"></span>
      <button onclick="logout()">⎋</button>
    </div>

    <div id="messages" class="messages"></div>
    <div id="typing" class="typing"></div>

    <div class="input-area">
      <input id="msg" placeholder="Type..." 
      oninput="typingNow()"
      onkeypress="if(event.key==='Enter') sendMsg()">

      <input type="file" id="imgInput" hidden>
      <button onclick="imgInput.click()">📷</button>

      <button onclick="addEmoji()">😊</button>
      <button onclick="sendMsg()">➤</button>
    </div>

  </div>

</div>

<!-- GROUP MODAL -->
<div id="groupModal" class="modal">
  <div class="modal-content">
    <h3>Create Group</h3>
    <input id="groupName" placeholder="Group name">
    <button onclick="createGroup()">Create</button>
    <button onclick="groupModal.style.display='none'">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script src="ui.js"></script>

</body>
</html>
