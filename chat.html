<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMates</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h3>ChatMates</h3>
    <ul id="userList"></ul>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="chat-user">
        <div class="avatar" id="chatAvatar">C</div>
        <div>
          <div id="chatName">Select Chat</div>
          <div id="statusText" class="status"></div>
        </div>
      </div>

      <div class="header-actions">
        <button onclick="toggleSidebar()">☰</button>
        <button onclick="logout()">⎋</button>
      </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="messages"></div>
    <div id="typing" class="typing"></div>

    <!-- INPUT -->
    <div class="input-area">
      <button class="icon-btn" onclick="addEmoji()">😊</button>

      <input id="msg" placeholder="Type a message..."
        oninput="typingNow()"
        onkeypress="if(event.key==='Enter') sendMsg()">

      <input type="file" id="imgInput" hidden>
      <button class="icon-btn" onclick="imgInput.click()">📎</button>

      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="ui.js"></script>

</body>
</html>
