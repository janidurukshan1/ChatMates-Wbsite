<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMates</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

  <div class="card">

    <h1>ChatMates</h1>
    <p>Welcome back 👋</p>

    <input id="email" placeholder="Email Address">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Start Messaging</button>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDUvwNFqMNHO_REKwHt0uYL4xOG2TMK0BU",
  authDomain: "chatmates-e2c70.firebaseapp.com",
  projectId: "chatmates-e2c70"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

loginBtn.onclick = function(){
  let email = emailInput.value.trim();
  let password = passwordInput.value.trim();

  if(!email || !password){
    alert("Enter details");
    return;
  }

  auth.signInWithEmailAndPassword(email,password)
    .then(()=>{
      document.body.classList.add("fade-out");
      setTimeout(()=>location="chat.html",500);
    })
    .catch(e=>alert(e.message));
}

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
</script>

</body>
</html>
