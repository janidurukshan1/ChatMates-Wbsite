<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatMates</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Intro Slides -->
<div id="intro" class="intro">
  <div class="slide active">💬 Welcome to ChatMates</div>
  <div class="slide">⚡ Fast Messaging</div>
  <div class="slide">🔒 Secure Chat</div>
</div>

<!-- Login -->
<div class="login-box fade-in">
  <h1>ChatMates</h1>

  <input id="email" placeholder="Email Address">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Start Messaging</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Intro slider
let slides = document.querySelectorAll(".slide");
let i = 0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i = (i+1)%slides.length;
  slides[i].classList.add("active");
},2000);

// Login
document.getElementById("loginBtn").onclick = function(){
  const email = emailInput.value;
  const password = passwordInput.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(()=>{
      document.body.classList.add("fade-out");
      setTimeout(()=> location="chat.html", 500);
    })
    .catch(e=> alert(e.message));
};

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
</script>

</body>
</html>
